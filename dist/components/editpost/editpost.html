<div class="row">
    <form class="col s12 card padding10px" novalidate #f="ngForm" (ngSubmit)="updatePost(f.valid, f.value)">
        <div class="row">
            <h5 class="pink-text">{{User.feed.name}}</h5>
        </div>
        <div class="row">
            <label for="title">Title/Headline</label>
            <div class="input-field">
                <input type="text" class="validate" #title="ngModel" name="title" [(ngModel)]="post.title" placeholder="Title" required>
                <small class="invalid-test" [hidden]="title.valid || (title.pristine && !f._submitted)">
                    Title is required.
                </small>
            </div>
        </div>
        <div class="row">
            <label for="editor">Add text, links, images, embed videos</label>
            <input type="hidden" class="validate" #editor="ngModel" name="detail" [(ngModel)]="post.detail" placeholder="Detail" required>
            <div id="editor"></div>
            <small class="invalid-test" [hidden]="editor.valid || (editor.pristine && !f._submitted)">
                Detail is required.
            </small>
        </div>
        <div class="row">
            <label for="priority">Priority</label>
            <div class="input-field">
                <select class="browser-default" #priority="ngModel" name="priority" [(ngModel)]="post.priority" required>
                    <option value="" disabled selected>Is it breaking now?</option>
                    <option value="High">Breaking</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Normal</option>
                </select>
                <small class="invalid-test" [hidden]="priority.valid || (priority.pristine && !f._submitted)">
                    Priority is required.
                </small>
            </div>
        </div>
        <div class="row">
            <label for="type">Type</label>
            <div class="input-field">
                <select class="browser-default" #type="ngModel" multiple name="type" [(ngModel)]="post.types" multiple required style="height: 80pt;">
                    <option value="" disabled selected>Select Type</option>
                    <option value="file-document">Text</option>
                    <option value="camera">Image</option>
                    <option value="play-box-outline">Video</option>
                    <option value="microphone">Audio</option>
                </select>
                <small class="invalid-test" [hidden]="type.valid || (type.pristine && !f._submitted)">
                    Type is required.
                </small>
            </div>
        </div>
        <div class="row">
            <label for="categories">Categories</label>
            <div class="input-field">
                <select class="browser-default" #category="ngModel" name="category" [(ngModel)]="post.category" required>
                    <option value="" disabled selected>Select Category</option>
                    <option *ngFor="let cat of categories" [value]="cat" >{{cat}}</option>
                </select>
                <small class="invalid-test" [hidden]="category.valid || (category.pristine && !f._submitted)">
                    Category is required.
                </small>
            </div>
        </div>
        <div class="row">
            <label for="pdfLink">Add link to PDF</label>
            <div class="input-field">
                <input type="text" class="validate" #pdfLink="ngModel" name="pdfLink" [(ngModel)]="post.pdfLink" placeholder="Pdf Link">
            </div>
        </div>
        <div class="row">
            <label for="gsheetLink">Add dataset in csv format or a Google link</label>
            <div class="input-field">
                <!--<input type="text" class="validate" #gsheetLink="ngModel" name="gsheetLink" [(ngModel)]="post.gsheetLink" placeholder="Google Spread Sheet Link">-->
                <input type="file" id="browseCSVFile" (change)="handleFiles($event)" class="validate" #gsheetLink="ngModel" name="gsheetLink" value="asad" [(ngModel)]="gl" pattern="[0-9a-z]{1,}.(csv)$">
            </div>
        </div>
        <div class="row">
            <label for="mainUrl">Main url (just saving a link? we can make magic with it)</label>
            <div class="input-field">
                <input type="text" class="validate" #mainUrl="ngModel" name="mainUrl" [(ngModel)]="post.mainUrl" placeholder="Main Url">
            </div>
        </div>
        <div class="row center-align">
            <span class="red-text" id="errorPost"></span>
        </div>
        <div class="modal-footer">
            <div class="preloader-wrapper small active" *ngIf="postLoading">
                <div class="spinner-layer spinner-green-only">
                    <div class="circle-clipper left">
                        <div class="circle"></div>
                    </div>
                    <div class="gap-patch">
                        <div class="circle"></div>
                    </div>
                    <div class="circle-clipper right">
                        <div class="circle"></div>
                    </div>
                </div>
            </div>
            <button type="submit" class="waves-effect waves-light btn purple white-text right">Update</button>
        </div>
    </form>
</div>
