<nav class="nav-wrapper pink">
    <div style="padding-left: 10px">
        <a data-activates="mobile-demo" class="button-collapse"><i class="mdi mdi-menu"></i></a>
        <a (click)="navigate()" class="brand-logo">{{activePage.title}}</a>
    </div>
    <ul class="right hide-on-med-and-down">
        <li><a (click)="loginModal()" *ngIf="!User.password.email">Login</a></li>
        <li><a (click)="registerModal()" *ngIf="!User.password.email">Create feed</a></li>
        <li class="valign-wrapper" *ngIf="User.password.profileImageURL" [routerLink]="['/Profile', { userid: User.feed.userid}]"><img [src]="User.password.profileImageURL" class="valign avatar circle" alt="User Profile Image"></li>
        <li *ngIf="User.password.email && !User.password.profileImageURL" [routerLink]="['/Profile', { userid: User.feed.userid}]"><i class="mdi mdi-account valign avatar circle"></i></li>
        <li [routerLink]="['/Profile', { userid: User.feed.userid}]">{{User.password.email}}</li>
        <li><a (click)="logout()" *ngIf="User.password.email">Logout</a></li>
    </ul>
    <ul class="side-nav" id="mobile-demo">
        <li><a class="blue-text" (click)="loginModal()" *ngIf="!User.password.email">Login</a></li>
        <li><a class="blue-text" (click)="registerModal()" *ngIf="!User.password.email">Create feed</a></li>
        <li>
            <a class="valign-wrapper" [routerLink]="['/Profile', { userid: User.feed.userid}]">
                <img *ngIf="User.password.profileImageURL" [src]="User.password.profileImageURL" class="circle avatar left" alt="User Profile Image">
                <i *ngIf="User.password.email && !User.password.profileImageURL" class="blue-text mdi mdi-account valign avatar circle left"></i>
                <span class="blue-text center-align right">{{User.password.email}}</span>
            </a>
        </li>
        <li><a class="pink-text text-accent-1 center-align" (click)="logout()" *ngIf="User.password.email">Logout</a></li>
    </ul>
</nav>
<div id="loginModal" class="modal" style="width: 30% ! important">
    <div class="modal-content">
        <div class="nav-wrapper center-align">
            <h2 class="purple-text">Login</h2>
        </div>
        <div class="row">
            <label for="email">Email</label>
            <div class="input-field">
                <input type="text" class="validate" #email placeholder="Email" required>
            </div>
        </div>
        <div class="row">
            <label for="password">Password</label>
            <div class="input-field">
                <input type="password" class="validate" #password placeholder="password" required>
            </div>
        </div>
        <div class="row center-align">
            <span class="red-text" id="errorLogin"></span>
        </div>
        <div class="modal-footer">
            <div class="preloader-wrapper small active" *ngIf="loginLoading">
                <div class="spinner-layer spinner-blue-only">
                    <div class="circle-clipper left">
                        <div class="circle"></div>
                    </div>
                    <div class="gap-patch">
                        <div class="circle"></div>
                    </div>
                    <div class="circle-clipper right">
                        <div class="circle"></div>
                    </div>
                </div>
            </div>
            <a class="waves-effect waves-blue btn white-text" (click)="login(email, password)">Login</a>
        </div>
    </div>
</div>
<div id="registerModal" class="modal" style="width: 30% ! important">
    <div class="modal-content">
        <div class="nav-wrapper center-align">
            <h2 class="purple-text">Register</h2>
        </div>
        <div class="card padding10px">
            <div class="row">
                <label for="reqUserID">User ID</label>
                <div class="input-field">
                    <input type="text" class="validate" #regUserID placeholder="User ID" required>
                </div>
            </div>
            <div class="row">
                <label for="regEmail">Email</label>
                <div class="input-field">
                    <input type="text" class="validate" #regEmail placeholder="Email" required>
                </div>
            </div>
            <div class="row">
                <label for="regPassword">Password</label>
                <div class="input-field">
                    <input type="password" class="validate" #regPassword placeholder="password" required>
                </div>
            </div>
            <div class="row center-align">
                <span class="red-text" id="errorRegister"></span>
            </div>
            <div class="modal-footer">
                <div class="preloader-wrapper small active" *ngIf="registerLoading">
                    <div class="spinner-layer spinner-blue-only">
                        <div class="circle-clipper left">
                            <div class="circle"></div>
                        </div>
                        <div class="gap-patch">
                            <div class="circle"></div>
                        </div>
                        <div class="circle-clipper right">
                            <div class="circle"></div>
                        </div>
                    </div>
                </div>
                <a class="waves-effect waves-blue btn white-text" (click)="register(regUserID, regEmail, regPassword)">Create</a>
            </div>
        </div>
    </div>
</div>
