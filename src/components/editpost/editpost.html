<div class="row">
    <div class="col s12 card padding10px">
        <div class="row">
            <h5 class="pink-text">{{User.feed.name}}</h5>
        </div>
        <div class="row">
            <label for="title">Title/Headline</label>
            <div class="input-field">
                <input type="text" class="validate" id="title" #title placeholder="Title">
            </div>
        </div>
        <div class="row">
            <label for="editor">Add text, links, images, embed videos</label>
            <div id="editor"></div>
        </div>
        <div class="row">
            <label for="priority">Priority</label>
            <div class="input-field">
                <select id="priority" #priority>
                    <option value="" disabled selected>Select Priority</option>
                    <option value="High">Urgent</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>
        </div>
        <div class="row">
            <label for="type">Type</label>
            <div class="input-field">
                <select id="type" #type multiple>
                    <option value="" disabled selected>Select Type</option>
                    <option value="file-document">Text</option>
                    <option value="camera">Image</option>
                    <option value="play-box-outline">Video</option>
                    <option value="microphone">Audio</option>
                </select>
            </div>
        </div>
        <div class="row">
            <label for="categories">Categories</label>
            <div class="input-field">
                <select class="browser-default" id="categories" #category>
                    <option value="" disabled selected>Select Category</option>
                    <option *ngFor="let cat of categories" [value]="cat" >{{cat}}</option>
                </select>
            </div>
        </div>
        <div class="row">
            <label for="pdfLink">Pdf Link</label>
            <div class="input-field">
                <input type="text" class="validate" id="pdfLink" #pdfLink placeholder="Pdf Link">
            </div>
        </div>
        <div class="row">
            <label for="gsheetLink">Google Spread Sheet Link</label>
            <div class="input-field">
                <input type="text" class="validate" id="gsheetLink" #gsheetLink placeholder="Google Spread Sheet Link">
            </div>
        </div>
        <div class="row center-align">
            <span class="red-text" id="errorPost"></span>
        </div>
        <div class="modal-footer">
            <div class="preloader-wrapper small active" *ngIf="postLoading">
                <div class="spinner-layer spinner-green-only">
                    <div class="circle-clipper left">
                        <div class="circle"></div>
                    </div>
                    <div class="gap-patch">
                        <div class="circle"></div>
                    </div>
                    <div class="circle-clipper right">
                        <div class="circle"></div>
                    </div>
                </div>
            </div>
            <a class="waves-effect waves-light btn purple white-text right" (click)="updatePost(title, priority, type, category, pdfLink, gsheetLink)">Update</a>
        </div>
    </div>
</div>
