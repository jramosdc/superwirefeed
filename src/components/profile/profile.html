<main class="profile" *ngIf="!editMode && profile">
	<header class="center-container">
		<section class="avatar">
			<img [src]="profile.profileImageURL" alt="User Profile Image">
			<div>
				<!-- <h4>{{profile.displayName || profile.email}}</h4> -->
				<h4>{{profile.feedName}}</h4>
				<span>@{{profile.feedId}}</span>
			</div>
		</section>

		<div class="cover">
			<img [src]="profile.backgroundImageURL" alt="{{profile.feedName}}">
		</div>

		<section class="meta">
			<div class="description">
				<h6>Biography</h6>
				<p>Washington correspondent and former RISJ fellow at Oxford <a>More</a></p>
			</div>
			<div>
				<h6>Interests</h6>
				<p>Analythics, Politics</p>
			</div>
			<div>
				<h6>Followers</h6>
				<h4>121</h4>
			</div>
			<div>
				<h6>Following</h6>
				<h4>151</h4>
			</div>
			<div>
				<h6>Posts</h6>
				<h4>11</h4>
			</div>
		</section>

    <button class="follow waves-effect waves-light btn-large">
    	<i class="mdi mdi-plus-circle"></i>
      Follow
    </button>
	</header>

  <hr class="line">

	<div class="content">
		<div class="center-container">
  		<pre>{{ profile | json }}</pre>
		</div>
	</div>
</main>
