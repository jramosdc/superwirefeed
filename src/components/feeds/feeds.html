<div class="tabs-wrapper">
  <ul class="tabs center-container">
    <li class="tab col s2" (click)="activeCategory = category" *ngFor="let category of categories">
      <a [ngClass]="{active: activeCategory === category}">
        {{category}}
      </a>
    </li>
  </ul>

  <hr class="line">
</div>

<div class="progress" *ngIf="feeds.length == 0">
  <div class="indeterminate"></div>
</div>

<div class="grid center-container">
  <div *ngFor="let feed of feeds | async | searchCategory: activeCategory | orderBy: ['-timestamp']">
  <!--<div *ngFor="let feed of feeds | async ">-->
    <article class="card feed-card" *ngIf="feed.feedName">

      <figure class="card-image" [routerLink]="['/posts', feed.$key]">
        <img class="responsive-img" *ngIf="feed.useBackgroundImage && feed.owner.backgroundImageURL" [src]="feed.owner.backgroundImageURL"
          alt="Background Image">
        <!-- temporary placeholder image -->
        <img class="responsive-img" *ngIf="!feed.useBackgroundImage" [src]="'http://lorempixel.com/300/'+feed.$key.length*20+'/?random='+feed.$key"
          alt="Background Image">
        <img class="responsive-img" *ngIf="feed.useBackgroundImage  && !feed.owner.backgroundImageURL" src="http://www.qqxxzx.com/images/gradient-wallpaper/gradient-wallpaper-3.jpg"
          alt="Background Image">

        <time>{{returnMoment(feed.timestamp)}}</time>

        <figcaption>
          <h5>{{feed.feedName}}</h5>
          <div>
            <span>
              <i class="mdi mdi-lock" *ngIf="feed.private === 'true'"></i>
              {{(feed.posts | async)?.length}} Posts
              • {{feed.description}}</span>
          </div>
        </figcaption>
      </figure>

      <div class="card-stacked">
        <div class="avatar card-content" [routerLink]="['/profile/', feed.owner.userid]">
          <img class="activator" *ngIf="!feed.owner.profileImageURL" src="https://cdn1.iconfinder.com/data/icons/user-pictures/101/malecostume-512.png">
          <img class="activator" *ngIf="feed.owner.profileImageURL" [src]="feed.owner.profileImageURL">
          <h6>@{{feed.owner.userid}}</h6>
        </div>

        <div class="thumb card-content">
          <i class="mdi mdi-thumb-up"></i>
          <span>{{feed.likes || 0}}</span>
        </div>
      </div>

    </article>
  </div>
</div>
