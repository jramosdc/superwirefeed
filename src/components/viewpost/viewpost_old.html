<main class="view-post center-container" *ngIf="post">
  <div>
    <!--  *ngIf="User.password.email && post.owner.userid == User.feed.userid" -->

    <div>
      <a class="btn-floating btn-large waves-effect waves-light deep-purple" [routerLink]="['/editpost', postid]">
        <i class="large mdi mdi-pencil"></i>
      </a>
    </div>

    <div class="row">
      <div class="card panel indigo">
        <h5 [routerLink]="['/profile', post.owner.userid]">@{{post.owner.userid}}</h5>
      </div>
    </div>

    <div class="row">
      <ul class="collapsible" data-collapsible="accordion">
        <li class="posttitle">
          <h2><span>{{post.title}}</span></h2>
          <img [src]="post.embedly.images[0].url" class="img_header" *ngIf="post.embedly && post.embedly.images">
          <img src="http://www.davidluke.com/wp-content/themes/david-luke/media/ims/placeholder720.gif" class="img_header" *ngIf="!post.mainUrl">
          <div class="more" *ngIf="post.embedly && post.embedly.url">
            <a class="btn-floating waves-effect waves-light indigo" href="{{post.embedly.url}}" target="_blank"><i class="large mdi mdi-link"></i></a>
          </div>
        </li>
        <li>
          <div class="collapsible-header">
            <i *ngFor="let type of post.types" class="mdi {{'mdi-' + type}}"></i> Content
          </div>

          <div class="collapsible-body">
            <div id="postDetails" class="demo-container">dddd</div>
          </div>
        </li>
        <li *ngIf="post.pdfLink">
          <div class="collapsible-header">
            <i class="mdi mdi-file-pdf"></i> PDF
          </div>

          <div class="collapsible-body">
            <iframe [src]="post.purl"></iframe>
          </div>
        </li>

        <li *ngIf="post.gsheetLink">
          <div class="collapsible-header">
            <i class="mdi mdi-google-drive"></i> Data
          </div>

          <div class="collapsible-body">
            <div id="fullTable"></div>
          </div>
        </li>
      </ul>
    </div>

    <div class="row">
      <div class="md-chip red">
        <div class="md-chip-img">
          <span class="md-chip-span orange">P</span>
        </div>

        <span class="md-chip-text">{{post.priority}}</span>
      </div>
    </div>

    <div class="row">
      <div class="md-chip indigo">
        <div class="md-chip-img">
          <span class="md-chip-span pink">C</span>
        </div>

        <span class="md-chip-text">{{post.category}}</span>
      </div>
    </div>

    <div class="row" *ngIf="post.pdfLink">
      <a href="{{post.pdfLink}}" target="_blank" class="btn-floating btn-large blue">
        <i class="mdi mdi-file-pdf"></i>
      </a>
    </div>

    <div class="row" *ngIf="post.gsheetLink">
      <a href="{{post.gsheetLink}}" target="_blank" class="btn-floating btn-large blue">
        <i class="mdi mdi-google-drive"></i>
      </a>
    </div>

    <div class="row">
      <h5 class="indigo-text">{{returnMoment(post.timestamp)}}</h5>
    </div>
  </div>

  <section class="post">
    <h2 class="title">{{post.title}}</h2>
  </section>

  <aside class="meta">
    <!--  -->
  </aside>
</main>
